mode: deployment
image:
  repository: "otel/opentelemetry-collector-k8s"
config:
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}

  processors:
    batch: {}

  exporters:
    debug: {}

    otlp:
      endpoint: jaeger.tracing.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug, otlp]