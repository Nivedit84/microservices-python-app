apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: converter-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: converter

  namespaceSelector:
    matchNames:
      - default

  endpoints:
  - port: metrics
    path: /metrics
    interval: 15s